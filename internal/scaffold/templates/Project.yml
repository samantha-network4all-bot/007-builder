name: __PROJECT_NAME__
options:
  bundleIdPrefix: com.bimboware
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
targets:
  __PROJECT_NAME__:
    type: application
    platform: macOS
    scheme:
      gatherCoverageData: false
    sources:
      - path: __PROJECT_NAME__
    settings:
      base:
        PRODUCT_NAME: __PROJECT_NAME__
        PRODUCT_BUNDLE_IDENTIFIER: com.bimboware.__PROJECT_NAME_LOWER__
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ARCHS: "arm64 x86_64"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: __PROJECT_NAME__/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
    info:
      path: __PROJECT_NAME__/Info.plist
      properties:
        CFBundleDisplayName: __PROJECT_NAME__
        CFBundleIdentifier: com.bimboware.__PROJECT_NAME_LOWER__
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "13.0"
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            CFBundleTypeExtensions:
              - txt
            CFBundleTypeIconFile: ""
        CFBundleName: __PROJECT_NAME__
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
