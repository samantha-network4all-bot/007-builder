# builder config for the __PROJECT_NAME__ project.
# Consumed by github.com/samantha-network4all-bot/007-builder
# Generated by `builder init`. Edit freely; init never overwrites an
# existing config.

project:
  name: __PROJECT_NAME__
  repo: __PROJECT_REPO__

paths:
  prd: PRD.md
  lessons: lessons-learned.md
  prompts: .agent/prompts
  state: .__PROJECT_NAME_LOWER__

llm:
  cli: pi                 # or "claude"
  model: openrouter/owl-alpha
  tools: read,bash,edit,write,grep,find,ls
  caveman: true           # prepend a "no monologues" directive to every prompt

skills:
  code:
    - .agent/skills/mvc-appkit.md
  review:
    - .agent/skills/thermo-nuclear.md

loop:
  attempts_per_issue: 10
  hitl_label: awaiting-human-review
  slice_label: slice
  attempt_label_prefix: "attempt:"

feature_test:
  # The runner exports this env var when launching the built binary so
  # the test API listener turns on.
  enable_env: __PROJECT_NAME_UPPER___TEST_API=1
  # File the app writes its chosen port to before accepting connections.
  port_file: ~/Library/Application Support/__PROJECT_NAME__/test-api.port
  build:
    - xcodegen generate
    - xcodebuild -scheme __PROJECT_NAME__ -configuration Debug -derivedDataPath build/ build
  binary: build/Build/Products/Debug/__PROJECT_NAME__.app/Contents/MacOS/__PROJECT_NAME__
  shutdown_endpoint: /shutdown
  healthz_endpoint: /healthz
  healthz_timeout_seconds: 10
